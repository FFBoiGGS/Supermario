<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mario Pro - Deniz Z Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #5c94fc; font-family: 'Arial Black', sans-serif; touch-action: none; }
        canvas { display: block; }
        
        /* GUI Tasarımı */
        #gui {
            position: absolute; top: 10px; left: 10px; right: 10px;
            display: flex; justify-content: space-between;
            color: white; text-shadow: 3px 3px 0px #000; z-index: 10;
        }
        .signature {
            position: absolute; top: 50px; width: 100%; text-align: center;
            color: rgba(255, 255, 255, 0.6); font-size: 14px; letter-spacing: 2px;
        }

        /* Kontrol Paneli */
        .controls {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: space-around; align-items: center; z-index: 20;
        }
        .dir-pad { display: flex; gap: 20px; }
        .btn {
            width: 75px; height: 75px; background: rgba(0, 0, 0, 0.4);
            border: 4px solid #fff; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 30px; font-weight: bold;
        }
        .btn:active { background: #fff; color: #000; }
        .jump-btn { width: 90px; height: 90px; border-radius: 50%; background: #e74c3c !important; }
    </style>
</head>
<body>

<div id="gui">
    <div>PUAN: <span id="score">0</span></div>
    <div>CAN: <span id="lives">3</span></div>
</div>
<div class="signature">DENİZ Z TARAFINDAN YAPILDI</div>

<canvas id="gameCanvas"></canvas>

<div class="controls">
    <div class="dir-pad">
        <div class="btn" id="leftBtn">←</div>
        <div class="btn" id="rightBtn">→</div>
    </div>
    <div class="btn jump-btn" id="jumpBtn">A</div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Değişkenler
let score = 0;
let lives = 3;
let gameOver = false;
const gravity = 0.8;

const player = {
    x: 50, y: 100, w: 40, h: 50, vx: 0, vy: 0,
    speed: 5, jump: 15, grounded: false, side: 1
};

// Dünya ve Düşmanlar
const platforms = [
    {x: 0, y: canvas.height - 80, w: 5000, h: 80, c: "#74bf2e"}, // Yer
    {x: 200, y: canvas.height - 200, w: 150, h: 30, c: "#ab5233"},
    {x: 450, y: canvas.height - 320, w: 150, h: 30, c: "#ab5233"},
    {x: 700, y: canvas.height - 220, w: 200, h: 30, c: "#ab5233"}
];

const enemies = [
    {x: 400, y: canvas.height - 130, w: 40, h: 40, vx: 2, range: 150, startX: 400},
    {x: 800, y: canvas.height - 130, w: 40, h: 40, vx: -2, range: 200, startX: 800}
];

// Kontroller
let keys = { left: false, right: false };
const setupBtn = (id, fnStart, fnEnd) => {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', (e) => { e.preventDefault(); fnStart(); });
    el.addEventListener('touchend', (e) => { e.preventDefault(); fnEnd(); });
};

setupBtn('leftBtn', () => { keys.left = true; player.side = -1; }, () => keys.left = false);
setupBtn('rightBtn', () => { keys.right = true; player.side = 1; }, () => keys.right = false);
setupBtn('jumpBtn', () => { if(player.grounded) player.vy = -player.jump; }, () => {});

function update() {
    if (gameOver) return;

    if (keys.left) player.vx = -player.speed;
    else if (keys.right) player.vx = player.speed;
    else player.vx *= 0.8;

    player.vy += gravity;
    player.x += player.vx;
    player.y += player.vy;

    // Platform Çarpışma
    player.grounded = false;
    platforms.forEach(p => {
        if (player.x < p.x + p.w && player.x + player.w > p.x &&
            player.y < p.y + p.h && player.y + player.h > p.y) {
            if (player.vy > 0) {
                player.vy = 0;
                player.y = p.y - player.h;
                player.grounded = true;
            }
        }
    });

    // Düşman Hareket ve Çarpışma
    enemies.forEach((en, index) => {
        en.x += en.vx;
        if (Math.abs(en.x - en.startX) > en.range) en.vx *= -1;

        // Çarpışma kontrolü
        if (player.x < en.x + en.w && player.x + player.w > en.x &&
            player.y < en.y + en.h && player.y + player.h > en.y) {
            
            if (player.vy > 5) { // Üstüne zıplarsa
                enemies.splice(index, 1);
                player.vy = -10;
                score += 100;
                document.getElementById('score').innerText = score;
            } else { // Çarparsa yanar
                lives--;
                document.getElementById('lives').innerText = lives;
                player.x = 50; player.y = 100;
                if (lives <= 0) { gameOver = true; alert("OYUN BİTTİ! Skorun: " + score); location.reload(); }
            }
        }
    });

    if (player.x < 0) player.x = 0;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Platformlar
    platforms.forEach(p => {
        ctx.fillStyle = p.c;
        ctx.fillRect(p.x, p.y, p.w, p.h);
    });

    // Düşmanlar (Goomba niyetine kırmızı blok)
    ctx.fillStyle = "#2c3e50";
    enemies.forEach(en => {
        ctx.fillRect(en.x, en.y, en.w, en.h);
        ctx.fillStyle = "red";
        ctx.fillRect(en.x + 5, en.y + 10, 10, 10); // Göz 1
        ctx.fillRect(en.x + 25, en.y + 10, 10, 10); // Göz 2
        ctx.fillStyle = "#2c3e50";
    });

    // Mario Çizimi (Deniz Z Özel Versiyon)
    ctx.save();
    ctx.translate(player.x + player.w/2, player.y + player.h/2);
    if(player.side === -1) ctx.scale(-1, 1);
    
    ctx.fillStyle = "red"; ctx.fillRect(-20, -25, 40, 40); // Gövde
    ctx.fillStyle = "#ffdbac"; ctx.fillRect(-10, -20, 25, 20); // Yüz
    ctx.fillStyle = "blue"; ctx.fillRect(-20, 5, 40, 20); // Tulum
    ctx.restore();

    update();
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
