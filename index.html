<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Süper Mario - Ultra Edition by Deniz Z</title>
    <style>
        body { margin: 0; overflow: hidden; background: #5c94fc; font-family: 'Arial Black', sans-serif; touch-action: none; }
        canvas { display: block; }

        /* Full Screen UI */
        .overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 500; color: white;
        }
        .hidden { display: none !important; }

        .btn-ui { 
            padding: 20px 60px; margin: 15px; background: #e74c3c; 
            border: 4px solid #fff; border-radius: 15px; color: white; 
            font-size: 26px; font-weight: bold; cursor: pointer; box-shadow: 0 8px 0 #c0392b;
        }
        .btn-ui:active { transform: translateY(4px); box-shadow: 0 4px 0 #c0392b; }

        #gui { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; color: white; z-index: 100; font-size: 24px; text-shadow: 3px 3px #000; }

        /* Profesyonel Kontroller */
        .controls { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: space-around; z-index: 100; }
        .t-btn { width: 85px; height: 85px; background: rgba(255,255,255,0.3); border: 4px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 40px; }
        .jump { background: #f1c40f !important; width: 100px; height: 100px; color: #000; }
    </style>
</head>
<body>

<div id="startScreen" class="overlay">
    <h1 style="font-size: 60px; color: #ff0000; -webkit-text-stroke: 2px white; margin: 0;">SÜPER MARİO</h1>
    <p style="color: #f1c40f;">DENİZ Z TARAFINDAN GELİŞTİRİLDİ</p>
    <button class="btn-ui" onclick="startGame()">OYUNU BAŞLAT</button>
    <button class="btn-ui" style="background: #34495e; box-shadow: 0 8px 0 #2c3e50;" onclick="toggleMenu('settingsScreen', true)">AYARLAR</button>
</div>

<div id="settingsScreen" class="overlay hidden">
    <h1 style="font-size: 50px;">"NE ARIYON?"</h1>
    <p>Hocam buralar hep kod dolu.</p>
    <button class="btn-ui" onclick="toggleMenu('settingsScreen', false)">GERİ DÖ</button>
</div>

<div id="deathScreen" class="overlay hidden">
    <h1 style="font-size: 60px; color: #ff0000;">GAME OVER</h1>
    <p>SKORUN: <span id="finalScore">0</span></p>
    <button class="btn-ui" onclick="location.reload()">BAŞTAN BAŞLA</button>
</div>

<div id="gui">
    <div>SKOR: <span id="scoreDisplay">0</span></div>
    <div>MOD: <span id="statusDisplay">NORMAL 👨‍</span></div>
</div>

<canvas id="gameCanvas"></canvas>

<div class="controls">
    <div style="display:flex; gap:30px;">
        <div class="t-btn" id="l">←</div>
        <div class="t-btn" id="r">→</div>
    </div>
    <div class="t-btn jump" id="j">A</div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let cameraX = 0;
let score = 0;
let isPlaying = false;
const gravity = 0.8;

const player = {
    x: 100, y: 0, w: 50, h: 50, vx: 0, vy: 0,
    big: false, grounded: false, side: 1, speed: 8 // Hız artırıldı
};

const platforms = [
    {x: 0, y: canvas.height-100, w: 15000, h: 100, color: '#522d1b'},
    {x: 500, y: canvas.height-250, w: 70, h: 70, box: true, item: true},
    {x: 800, y: canvas.height-350, w: 200, h: 40, color: '#ab5233'},
    {x: 1200, y: canvas.height-250, w: 70, h: 70, box: true, item: true},
    {x: 1500, y: canvas.height-450, w: 200, h: 40, color: '#ab5233'},
    {x: 2000, y: canvas.height-250, w: 300, h: 40, color: '#ab5233'}
];

const enemies = [
    {x: 900, y: canvas.height-150, w: 50, h: 50, vx: -3.5, start: 900, range: 400},
    {x: 1600, y: canvas.height-150, w: 50, h: 50, vx: -4, start: 1600, range: 500},
    {x: 2200, y: canvas.height-150, w: 50, h: 50, vx: -5, start: 2200, range: 300}
];

const mushrooms = [];

function startGame() { toggleMenu('startScreen', false); isPlaying = true; }
function toggleMenu(id, show) { document.getElementById(id).classList.toggle('hidden', !show); }

let keys = { l: false, r: false };
const setup = (id, dn, up) => {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', (e) => { e.preventDefault(); dn(); });
    el.addEventListener('touchend', (e) => { e.preventDefault(); up(); });
};
setup('l', () => { keys.l = true; player.side = -1; }, () => keys.l = false);
setup('r', () => { keys.r = true; player.side = 1; }, () => keys.r = false);
setup('j', () => { if(player.grounded) player.vy = -20; }, () => {});

function update() {
    if(!isPlaying) return;

    if(keys.l) player.vx = -player.speed;
    else if(keys.r) player.vx = player.speed;
    else player.vx *= 0.85;

    player.vy += gravity;
    player.x += player.vx;
    player.y += player.vy;

    // Geniş Açı Kamera (Mario ekranın ortasında kalır)
    cameraX = player.x - canvas.width / 2.5;

    player.grounded = false;
    platforms.forEach(p => {
        if(player.x < p.x + p.w && player.x + player.w > p.x && player.y < p.y + p.h && player.y + player.h > p.y) {
            if(player.vy > 0 && player.y + player.h - player.vy <= p.y) {
                player.vy = 0; player.y = p.y - player.h; player.grounded = true;
            } else if(player.vy < 0 && player.y - player.vy >= p.y + p.h) {
                player.vy = 4;
                if(p.box && p.item) { mushrooms.push({x: p.x + 10, y: p.y - 60, w: 45, h: 45, vx: 4, vy: 0}); p.item = false; }
            }
        }
    });

    mushrooms.forEach((m, i) => {
        m.vy += gravity; m.x += m.vx; m.y += m.vy;
        platforms.forEach(p => {
            if(m.x < p.x + p.w && m.x + m.w > p.x && m.y < p.y + p.h && m.y + m.h > p.y) {
                if(m.vy > 0) { m.vy = 0; m.y = p.y - m.h; }
            }
        });
        if(player.x < m.x + m.w && player.x + player.w > m.x && player.y < m.y + m.h && player.y + player.h > m.y) {
            player.big = true; player.h = 70;
            document.getElementById('statusDisplay').innerText = "SÜPER 🍄";
            mushrooms.splice(i, 1);
            score += 1000;
        }
    });

    enemies.forEach((en, i) => {
        en.x += en.vx;
        if(Math.abs(en.x - en.start) > en.range) en.vx *= -1;
        if(player.x < en.x + en.w && player.x + player.w > en.x && player.y < en.y + en.h && player.y + player.h > en.y) {
            // Mantar Botu Öldürme: Eğer büyüksen veya üstten zıplarsan düşman ölür
            if(player.vy > 5 || player.big) { 
                enemies.splice(i, 1); 
                if(player.vy > 5) player.vy = -15; // Zıplayınca yukarı fırlat
                score += 500; 
            } else {
                isPlaying = false; document.getElementById('finalScore').innerText = score; toggleMenu('deathScreen', true);
            }
        }
    });

    if(player.y > canvas.height) { isPlaying = false; toggleMenu('deathScreen', true); }
    document.getElementById('scoreDisplay').innerText = score;
}

function draw() {
    ctx.clearRect(0,0,canvas.width, canvas.height);
    ctx.save();
    ctx.translate(-cameraX, 0);

    // Arka Plan Detay (Dağlar)
    ctx.fillStyle = '#4a90e2';
    ctx.beginPath(); ctx.moveTo(200, canvas.height); ctx.lineTo(500, 200); ctx.lineTo(800, canvas.height); ctx.fill();

    platforms.forEach(p => {
        ctx.fillStyle = p.box ? (p.item ? '#f1c40f' : '#7f8c8d') : (p.color || '#ab5233');
        ctx.fillRect(p.x, p.y, p.w, p.h);
        if(p.box && p.item) { ctx.fillStyle='white'; ctx.font='bold 40px Arial'; ctx.fillText('?', p.x+22, p.y+48); }
    });

    ctx.font = '50px Arial';
    mushrooms.forEach(m => ctx.fillText('🍄', m.x, m.y + 40));
    enemies.forEach(en => ctx.fillText('👾', en.x, en.y + 45));
    
    ctx.save();
    if(player.side === -1) { ctx.translate(player.x + player.w, player.y); ctx.scale(-1, 1); ctx.fillText(player.big ? '🍄' : '👨‍', 0, player.h - 5); }
    else { ctx.fillText(player.big ? '🍄' : '👨‍', player.x, player.y + player.h - 5); }
    ctx.restore();

    ctx.restore();
    update();
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
