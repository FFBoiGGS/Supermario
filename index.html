<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Emoji Mario</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    background: #1a1a2e; 
    font-family: Arial, sans-serif; 
    overflow: hidden;
  }
  #game {
    width: 100vw;
    height: 100vh;
    background: linear-gradient(to bottom, #87CEEB 0%, #5c94fc 70%, #228B22 70%);
    position: relative;
    overflow: hidden;
  }
  .screen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
  }
  #menu {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
  }
  #menu h1 {
    font-size: 2.5rem;
    margin-bottom: 20px;
    text-shadow: 4px 4px 0 #000;
    text-align: center;
  }
  #menu button {
    font-size: 1.3rem;
    padding: 15px 40px;
    margin: 10px;
    background: #FFD700;
    border: 3px solid #000;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 4px 4px 0 #000;
  }
  #menu button:active { transform: translate(2px, 2px); }
  .credit {
    position: absolute;
    bottom: 20px;
    font-size: 1rem;
    color: #fff;
    text-shadow: 2px 2px 0 #000;
  }
  #howToPlay, #settings {
    background: rgba(0,0,0,0.9);
    color: white;
    padding: 20px;
    text-align: center;
    display: none;
  }
  #howToPlay h2, #settings h2 { font-size: 1.8rem; margin-bottom: 15px; }
  #howToPlay p { font-size: 1rem; margin: 10px 0; }
  #settings p { font-size: 1.2rem; }
  #player {
    position: absolute;
    font-size: 40px;
    bottom: 50px;
    left: 50px;
    z-index: 5;
  }
  .platform {
    position: absolute;
    background: #8B4513;
    border: 3px solid #000;
  }
  .coin {
    position: absolute;
    font-size: 30px;
    z-index: 4;
  }
  .enemy {
    position: absolute;
    font-size: 35px;
    z-index: 4;
  }
  #score {
    position: absolute;
    top: 15px;
    left: 15px;
    color: white;
    font-size: 20px;
    font-weight: bold;
    text-shadow: 3px 3px 0 #000;
    z-index: 5;
  }
  .ground {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 50px;
    background: #228B22;
    border-top: 3px solid #000;
  }
  #controls {
    position: absolute;
    bottom: 10px;
    left: 10px;
    right: 10px;
    display: flex;
    justify-content: space-between;
    z-index: 5;
  }
  .btn {
    width: 60px;
    height: 60px;
    background: rgba(255,255,255,0.3);
    border: 3px solid #000;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 25px;
    font-weight: bold;
    color: white;
    user-select: none;
  }
  #gameScreen { display: none; }
</style>
</head>
<body>
<div id="game">
  <div id="menu" class="screen">
    <h1>🍄 EMOJI MARIO 🍄</h1>
    <button onclick="startGame()">OYNA</button>
    <button onclick="showHowToPlay()">NASIL OYNANIR</button>
    <button onclick="showSettings()">AYARLAR</button>
    <div class="credit">DENİZ Z tarafından yapıldı</div>
  </div>

  <div id="howToPlay" class="screen">
    <h2>📖 NASIL OYNANIR</h2>
    <p>← → Hareket et</p>
    <p>↑ Zıpla</p>
    <p>🪙 Altınları topla: 100 puan</p>
    <p>🐢 Düşmanlara üstten bas: 200 puan</p>
    <p>Düşersen baştan başlarsın</p>
    <button onclick="hideHowToPlay()" style="margin-top:20px; font-size:1.2rem; padding:10px 30px;">GERİ</button>
  </div>

  <div id="settings" class="screen">
    <h2>⚙️ AYARLAR</h2>
    <p>Burasi hiçlik</p>
    <button onclick="hideSettings()" style="margin-top:20px; font-size:1.2rem; padding:10px 30px;">GERİ</button>
  </div>

  <div id="gameScreen" class="screen">
    <div id="score">Skor: 0</div>
    <div id="player">🧍</div>
    <div class="ground"></div>
    <div id="controls
