<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mario Klonu</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    background: #5c94fc; 
    font-family: 'Arial', sans-serif; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    min-height: 100vh;
    overflow: hidden;
  }
  #game {
    position: relative;
    width: 800px;
    height: 400px;
    background: #5c94fc;
    border: 4px solid #000;
    overflow: hidden;
  }
  #player {
    position: absolute;
    width: 32px;
    height: 32px;
    background: #ff0000;
    bottom: 50px;
    left: 50px;
    border: 2px solid #000;
  }
  .platform {
    position: absolute;
    background: #8B4513;
    border: 2px solid #000;
  }
  .coin {
    position: absolute;
    width: 20px;
    height: 20px;
    background: #FFD700;
    border-radius: 50%;
    border: 2px solid #000;
  }
  .enemy {
    position: absolute;
    width: 30px;
    height: 30px;
    background: #8B0000;
    border: 2px solid #000;
  }
  #score {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    font-size: 20px;
    font-weight: bold;
    text-shadow: 2px 2px 0 #000;
  }
  #controls {
    position: absolute;
    bottom: 10px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 14px;
  }
  .ground {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 50px;
    background: #228B22;
    border-top: 2px solid #000;
  }
</style>
</head>
<body>
<div id="game">
  <div id="score">Skor: 0</div>
  <div id="player"></div>
  <div class="ground"></div>
  <div id="controls">← → Hareket | SPACE Zıpla | R Yeniden Başlat</div>
</div>

<script>
const game = document.getElementById('game');
const player = document.getElementById('player');
const scoreEl = document.getElementById('score');

let playerX = 50;
let playerY = 50;
let velocityY = 0;
let velocityX = 0;
let onGround = false;
let score = 0;
let keys = {};

const gravity = 0.8;
const jumpPower = -15;
const moveSpeed = 5;

const platforms = [
  {x: 0, y: 350, w: 800, h: 50},
  {x: 200, y: 280, w: 100, h: 20},
  {x: 400, y: 220, w: 100, h: 20},
  {x: 600, y: 280, w: 100, h: 20}
];

const coins = [
  {x: 230, y: 240, collected: false},
  {x: 430, y: 180, collected: false},
  {x: 630, y: 240, collected: false}
];

const enemies = [
  {x: 300, y: 320, vx: 2},
  {x: 500, y: 320, vx: -2}
];

function createElements() {
  platforms.forEach(p => {
    const el = document.createElement('div');
    el.className = 'platform';
    el.style.left = p.x + 'px';
    el.style.top = p.y + 'px';
    el.style.width = p.w + 'px';
    el.style.height = p.h + 'px';
    game.appendChild(el);
  });
  
  coins.forEach(c => {
    const el = document.createElement('div');
    el.className = 'coin';
    el.style.left = c.x + 'px';
    el.style.top = c.y + 'px';
    el.id = 'coin-' + coins.indexOf(c);
    game.appendChild(el);
  });
  
  enemies.forEach(e => {
    const el = document.createElement('div');
    el.className = 'enemy';
    el.style.left = e.x + 'px';
    el.style.top = e.y + 'px';
    el.id = 'enemy-' + enemies.indexOf(e);
    game.appendChild(el);
  });
}

function update() {
  // Input
  if (keys['ArrowLeft']) velocityX = -moveSpeed;
  else if (keys['ArrowRight']) velocityX = moveSpeed;
  else velocityX = 0;
  
  if (keys[' '] && onGround) {
    velocityY = jumpPower;
    onGround = false;
  }
  
  // Physics
  velocityY += gravity;
  playerX += velocityX;
  playerY += velocityY;
  
  // Boundaries
  if (playerX < 0) playerX = 0;
  if (playerX > 768) playerX = 768;
  
  // Collision with platforms
  onGround = false;
  platforms.forEach(p => {
    if (playerX + 32 > p.x && playerX < p.x + p.w &&
        playerY + 32 > p.y && playerY < p.y + p.h) {
      if (velocityY > 0 && playerY < p.y) {
        playerY = p.y - 32;
        velocityY = 0;
        onGround = true;
      }
    }
  });
  
  // Coins
  coins.forEach((c, i) => {
    if (!c.collected && 
        playerX + 32 > c.x && playerX < c.x + 20 &&
        playerY + 32 > c.y && playerY < c.y + 20) {
      c.collected = true;
      document.getElementById('coin-' + i).style.display = 'none';
      score += 100;
      scoreEl.textContent = 'Skor: ' + score;
    }
  });
  
  // Enemies
  enemies.forEach((e, i) => {
    e.x += e.vx;
    if (e.x < 0 || e.x > 770) e.vx *= -1;
    document.getElementById('enemy-' + i).style.left = e.x + 'px';
    
    if (playerX + 32 > e.x && playerX < e.x + 30 &&
        playerY + 32 > e.y && playerY < e.y + 30) {
      if (velocityY > 0 && playerY < e.y) {
        velocityY = jumpPower;
        e.x = -100; // enemy ölür

      }
    }
  });
