<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Emoji Mario</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
  body { 
    background: #1a1a2e; 
    font-family: 'Arial', sans-serif; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    min-height: 100vh;
    overflow: hidden;
  }
  #game {
    position: relative;
    width: 100vw;
    height: 100vh;
    max-width: 900px;
    max-height: 600px;
    background: linear-gradient(to bottom, #87CEEB 0%, #5c94fc 70%, #228B22 70%);
    overflow: hidden;
    border: 4px solid #000;
  }
  .screen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
  }
  #menu {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
  }
  #menu h1 {
    font-size: 3rem;
    margin-bottom: 20px;
    text-shadow: 4px 4px 0 #000;
  }
  #menu button {
    font-size: 1.5rem;
    padding: 15px 40px;
    margin: 10px;
    background: #FFD700;
    border: 3px solid #000;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 4px 4px 0 #000;
  }
  #menu button:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #000; }
  #menu .credit {
    position: absolute;
    bottom: 20px;
    font-size: 1rem;
    color: #fff;
    text-shadow: 2px 2px 0 #000;
  }
  #howToPlay {
    background: rgba(0,0,0,0.9);
    color: white;
    padding: 40px;
    text-align: center;
    display: none;
  }
  #howToPlay h2 { font-size: 2rem; margin-bottom: 20px; }
