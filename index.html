<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mario Clone</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
  color: white;
  text-align: center;
}

/* MENÜ */
#menu, #gameover {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.hidden {
  display: none;
}

.title {
  font-size: 40px;
  margin-bottom: 20px;
}

.credit {
  margin-top: 20px;
  font-size: 20px;
  color: cyan;
  text-shadow: 0 0 10px cyan;
}

button {
  padding: 15px 30px;
  font-size: 20px;
  margin-top: 20px;
}

/* OYUN */
#game {
  display: none;
  background: skyblue;
  width: 100%;
  height: 100vh;
  position: relative;
}

#mario {
  position: absolute;
  bottom: 60px;
  left: 60px;
  font-size: 35px;
}

.big {
  font-size: 60px !important;
}

.ground {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 60px;
  background: green;
}

.enemy, .mushroom {
  position: absolute;
  bottom: 60px;
  font-size: 30px;
}

.controls {
  position: fixed;
  bottom: 20px;
  width: 100%;
}

.jumpBtn {
  width: 80px;
  height: 80px;
  font-size: 25px;
}
</style>
</head>

<body>

<!-- ANA MENÜ -->
<div id="menu">
  <div class="title">🍄 MINI MARIO</div>
  <button onclick="startGame()">Başla</button>
  <div class="credit">✨ DENİZ Z tarafından yapıldı ✨</div>
</div>

<!-- OYUN -->
<div id="game">
  <div id="mario">🍄</div>
  <div class="ground"></div>

  <div class="controls">
    <button class="jumpBtn" onclick="jump()">⬆️</button>
  </div>
</div>

<!-- GAME OVER -->
<div id="gameover" class="hidden">
  <div class="title">💀 ÖLDÜN</div>
  <button onclick="restart()">Tekrar Oyna</button>
  <div class="credit">✨ DENİZ Z tarafından yapıldı ✨</div>
</div>

<script>
let mario = document.getElementById("mario");
let gameDiv = document.getElementById("game");
let menu = document.getElementById("menu");
let gameover = document.getElementById("gameover");

let y, v, jumping, big, objects, running;

function startGame() {
  menu.classList.add("hidden");
  gameDiv.style.display = "block";
  resetGame();
}

function resetGame() {
  y = 60;
  v = 0;
  jumping = false;
  big = false;
  objects = [];
  running = true;
  mario.classList.remove("big");
}

function restart() {
  gameover.classList.add("hidden");
  gameDiv.style.display = "block";
  resetGame();
}

function jump() {
  if (!jumping) {
    v = 12;
    jumping = true;
  }
}

function spawnEnemy() {
  let e = document.createElement("div");
  e.className = "enemy";
  e.innerHTML = "👾";
  e.x = window.innerWidth;
  gameDiv.appendChild(e);
  objects.push(e);
}

function spawnMushroom() {
  let m = document.createElement("div");
  m.className = "mushroom";
  m.innerHTML = "🍄";
  m.x = window.innerWidth;
  gameDiv.appendChild(m);
  objects.push(m);
}

setInterval(() => {
  if (!running) return;
  Math.random() < 0.6 ? spawnEnemy() : spawnMushroom();
}, 2000);

function endGame() {
  running = false;
  gameDiv.style.display = "none";
  gameover.classList.remove("hidden");
}

function game() {
  if (running) {
    v -= 0.6;
    y += v;

    if (y <= 60) {
      y = 60;
      v = 0;
      jumping = false;
    }

    mario.style.bottom = y + "px";

    let marioX = 60;
    let size = big ? 60 : 35;

    objects.forEach((obj, i) => {
      obj.x -= 5;
      obj.style.left = obj.x + "px";

      if (
        obj.x < marioX + size &&
        obj.x + 30 > marioX &&
        y < 100
      ) {
        if (obj.className === "enemy") {
          if (v < 0) {
            obj.remove();
            objects.splice(i,1);
            v = 8;
          } else {
            endGame();
          }
        }

        if (obj.className === "mushroom") {
          big = true;
          mario.classList.add("big");
          obj.remove();
          objects.splice(i,1);
        }
      }

      if (obj.x < -50) {
        obj.remove();
        objects.splice(i,1);
      }
    });
  }

  requestAnimationFrame(game);
}

game();
</script>

</body>
</html>
