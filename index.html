<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Emoji Mario - Okul Versiyonu</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }
  #game {
    width: 100vw;
    height: 100vh;
    background: linear-gradient(to bottom, #87CEEB 0%, #5c94fc 70%, #228B22 70%);
    position: relative;
    overflow: hidden;
  }
.screen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
  }
  #menu {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
  }
  #menu h1 {
    font-size: 2.5rem;
    margin-bottom: 20px;
    text-shadow: 4px 4px 0 #000;
    text-align: center;
  }
  #menu button {
    font-size: 1.3rem;
    padding: 15px 40px;
    margin: 10px;
    background: #FFD700;
    border: 3px solid #000;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 4px 4px 0 #000;
  }
.credit {
    position: absolute;
    bottom: 20px;
    font-size: 1rem;
    color: #fff;
    text-shadow: 2px 2px 0 #000;
  }
  #howToPlay, #settings {
    background: rgba(0,0,0,0.9);
    color: white;
    padding: 20px;
    text-align: center;
    display: none;
  }
  #howToPlay h2, #settings h2 { font-size: 1.8rem; margin-bottom: 15px; }
  #howToPlay p { font-size: 1rem; margin: 10px 0; }
  #settings p { font-size: 1.2rem; }
  #player {
    position: absolute;
    font-size: 40px;
    bottom: 50px;
    left: 50px;
    z-index: 5;
    transition: transform 0.05s;
  }
.platform {
    position: absolute;
    background: #8B4513;
    border: 3px solid #000;
  }
.coin {
    position: absolute;
    font-size: 30px;
    z-index: 4;
  }
.enemy {
    position: absolute;
    font-size: 35px;
    z-index: 4;
  }
  #score {
    position: absolute;
    top: 15px;
    left: 15px;
    color: white;
    font-size: 20px;
    font-weight: bold;
    text-shadow: 3px 3px 0 #000;
    z-index: 5;
  }
.ground {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 50px;
    background: #228B22;
    border-top: 3px solid #000;
  }
  #controls {
    position: absolute;
    bottom: 20px;
    left: 20px;
    right: 20px;
    display: flex;
    justify-content: space-between;
    z-index: 5;
  }
.btn {
    width: 80px;
    height: 80px;
    background: rgba(255,255,255,0.5);
    border: 4px solid #000;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 35px;
    font-weight: bold;
    color: #000;
    user-select: none;
    -webkit-user-select: none;
  }
.btn:active { background: rgba(255,255,255,0.9); transform: scale(0.95); }
  #gameScreen { display: none; }
</style>
</head>
<body>
<div id="game">
  <div id="menu" class="screen">
    <h1>🍄 EMOJI MARIO 🍄</h1>
    <button onclick="startGame()">OYNA</button>
    <button onclick="showHowToPlay()">NASIL OYNANIR</button>
    <button onclick="showSettings()">AYARLAR</button>
    <div class="credit">DENİZ Z tarafından yapıldı</div>
  </div>

  <div id="howToPlay" class="screen">
    <h2>📖 NASIL OYNANIR</h2>
    <p>← → Hareket et</p>
    <p>↑ Zıpla</p>
    <p>🪙 Altınları topla: 100 puan</p>
    <p>🐢 Düşmanlara üstten bas: 200 puan</p>
    <p>Düşersen baştan başlarsın</p>
    <button onclick="hideHowToPlay()" style="margin-top:20px; font-size:1.2rem; padding:10px 30px;">GERİ</button>
  </div>

  <div id="settings" class="screen">
    <h2>⚙️ AYARLAR</h2>
    <p>Burasi hiçlik</p>
    <button onclick="hideSettings()" style="margin-top:20px; font-size:1.2rem; padding:10px 30px;">GERİ</button>
  </div>

  <div id="gameScreen" class="screen">
    <div id="score">Skor: 0</div>
    <div id="player">🧍</div>
    <div class="ground"></div>
    <div id="controls">
      <div style="display:flex; gap:15px;">
        <div class="btn" id="leftBtn">←</div>
        <div class="btn" id="rightBtn">→</div>
      </div>
      <div class="btn" id="jumpBtn">↑</div>
    </div>
  </div>
</div>

<script>
const game = document.getElementById('game');
const player = document.getElementById('player');
const scoreEl = document.getElementById('score');
const gameScreen = document.getElementById('gameScreen');
const menu = document.getElementById('menu');
const howToPlay = document.getElementById('howToPlay');
const settings = document.getElementById('settings');

let playerX = 50, playerY = 0, velocityY = 0, velocityX = 0, onGround = false, score = 0, keys = {}, gameRunning = false;
const gravity = 0.6, jumpPower = -12, moveSpeed = 5;
const platforms = [], coins = [], enemies = [], gameElements = [];

function startGame() {
  menu.style.display = 'none';
  gameScreen.style.display = 'flex';
  resetGame();
  initLevel();
  gameRunning = true;
  gameLoop();
}

function showHowToPlay() { menu.style.display = 'none'; howToPlay.style.display = 'flex'; }
function hideHowToPlay() { howToPlay.style.display = 'none'; menu.style.display = 'flex'; }
function showSettings() { menu.style.display = 'none'; settings.style.display = 'flex'; }
function hideSettings() { settings.style.display = 'none'; menu.style.display = 'flex'; }

function initLevel() {
  gameElements.forEach(el => el.remove());
  gameElements.length = 0;
  coins.length = 0;
  enemies.length = 0;
  platforms.length = 0;

  const gameHeight = game.clientHeight;
  const gameWidth = game.clientWidth;

  const platformData = [
    {x: 0, y: gameHeight - 50, w: gameWidth, h: 50},
    {x: gameWidth * 0.3, y: gameHeight - 150, w: 120, h: 20},
    {x: gameWidth * 0.6, y: gameHeight - 250, w: 120, h: 20},
    {x: gameWidth * 0.8, y: gameHeight - 150, w: 120, h: 20}
  ];

  platformData.forEach(p => {
    const el = document.createElement('div');
    el.className = 'platform';
    el.style.left = p.x + 'px';
    el.style.top = p.y + 'px';
    el.style.width = p.w + 'px';
    el.style.height = p.h + 'px';
    game.appendChild(el);
    gameElements.push(el);
    platforms.push(p);
  });

  const coinData = [
    {x: gameWidth * 0.35, y: gameHeight - 190},
    {x: gameWidth * 0.65, y: gameHeight - 290},
    {x: gameWidth * 0.85, y: gameHeight - 190}
  ];

  coinData.forEach((c, i) => {
    const el = document.createElement('div');
    el.className = 'coin';
    el.innerHTML = '🪙';
    el.style.left = c.x + 'px';
    el.style.top = c.y + 'px';
    el.id = 'coin-' + i;
    game.appendChild(el);
    gameElements.push(el);
    coins.push({...c, collected: false, element: el});
  });

  const enemyData = [
    {x: gameWidth * 0.45, y: gameHeight - 85, vx: 2},
    {x: gameWidth * 0.75, y: gameHeight - 85, vx: -2}
  ];

  enemyData.forEach((e, i) => {
    const el = document.createElement('div');
    el.className = 'enemy';
    el.innerHTML = '🐢';
    el.style.left = e.x + 'px';
    el.style.top = e.y + 'px';
    el.id = 'enemy-' + i;
    game.appendChild(el);
    gameElements.push(el);
    enemies.push({...e, element: el});
  });
}

function gameLoop() {
  if (!gameRunning) return;

  if (keys['ArrowLeft']) velocityX = -moveSpeed;
  else if (keys['ArrowRight']) velocityX = moveSpeed;
  else velocityX = 0;

  if (keys[' '] && onGround) {
    velocityY = jumpPower;
    onGround = false;
  }

  velocityY += gravity;
  playerX += velocityX;
  playerY += velocityY;

  if (playerX < 0) playerX = 0;
  if (playerX > game.clientWidth - 40) playerX = game.clientWidth - 40;

  onGround = false;
  platforms.forEach(p => {
    if (playerX + 40 > p.x && playerX < p.x + p.w &&
        playerY + 40 > p.y && playerY < p.y + p.h) {
      if (velocityY > 0 && playerY < p.y) {
        playerY = p.y - 40;
        velocityY = 0;
        onGround = true;
      }
    }
  });

  coins.forEach((c, i) => {
    if (!c.collected &&
        playerX + 40 > c.x && playerX < c.x + 30 &&
        playerY + 40 > c.y && playerY < c.y + 30) {
      c.collected = true;
      c.element.style.display = 'none';
      score += 100;
      scoreEl.textContent = 'Skor: ' + score;
    }
  });

  enemies.forEach((e, i) => {
    e.x += e.vx;
    if (e.x < 0 || e.x > game.clientWidth - 35) e.vx *= -1;
    e.element.style.left = e.x + 'px';

    if (playerX + 40 > e.x && playerX < e.x + 35 &&
        playerY + 40 > e.y && playerY < e.y + 35) {
      if (velocityY > 0 && playerY < e.y) {
        velocityY = jumpPower;
        e.element.style.display = 'none';
        e.x = -100;
        score += 200;
        scoreEl.textContent = 'Skor: ' + score;
      } else {
        resetGame();
      }
    }
  });

  player.style.left = playerX + 'px';
  player.style.top = playerY + 'px';

  if (playerY > game.clientHeight) resetGame();

  requestAnimationFrame(gameLoop);
}

function resetGame() {
  playerX = 50;
  playerY = game.clientHeight - 90;
  velocityY = 0;
  velocityX = 0;
  score = 0;
  scoreEl.textContent = 'Skor: 0';
  coins.forEach((c, i) => {
    c.collected = false;
    if (c.element) c.element.style.display = 'block';
  });
  enemies.forEach((e, i) => {
    if (e.element) e.element.style.display = 'block';
  });
}

// Klavye
document.addEventListener('keydown', (e) => {
  keys[e.key] = true;
  if (e.key === ' ') e.preventDefault();
});

document.addEventListener('keyup', (e) => {
  keys[e.key] = false;
});

// Mobil tuşlar - DÜZGÜN ÇALIŞAN
function setupButton(btn, key) {
  const press = (e) => {
    e.preventDefault();
    keys[key] = true;
    btn.style.background = 'rgba(255,255,255,0.9)';
  };
  const release = (e) => {
    e.preventDefault();
    keys[key] = false;
    btn.style.background = 'rgba(255,255,255,0.5)';
  };
  btn.addEventListener('touchstart', press);
  btn.addEventListener('touchend', release);
  btn.addEventListener('touchcancel', release);
  btn.addEventListener('mousedown', press);
  btn.addEventListener('mouseup', release);
  btn.addEventListener('mouseleave', release);
}

setupButton(document.getElementById('leftBtn'), 'ArrowLeft');
setupButton(document.getElementById('rightBtn'), 'ArrowRight');
setupButton(document.getElementById('jumpBtn'), ' ');
</script>
</body>
</html>
