<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Mini Mario</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: skyblue;
  }
  #game {
    position: relative;
    width: 100vw;
    height: 100vh;
  }
  #mario {
    position: absolute;
    bottom: 50px;
    left: 50px;
    width: 40px;
    height: 40px;
    background: red;
    border-radius: 5px;
  }
  .ground {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 50px;
    background: green;
  }
</style>
</head>
<body>

<div id="game">
  <div id="mario"></div>
  <div class="ground"></div>
</div>

<script>
let mario = document.getElementById("mario");
let jumping = false;
let velocity = 0;
let gravity = 0.5;
let position = 50;

document.addEventListener("keydown", function(e) {
  if (e.code === "Space" && !jumping) {
    velocity = 10;
    jumping = true;
  }
});

function gameLoop() {
  velocity -= gravity;
  position += velocity;

  if (position <= 50) {
    position = 50;
    jumping = false;
  }

  mario.style.bottom = position + "px";

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
