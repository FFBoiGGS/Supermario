<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mario</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: skyblue;
}

#mario {
  position: absolute;
  bottom: 60px;
  left: 50px;
  width: 50px;
  height: 50px;
  background: red;
}

.ground {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 60px;
  background: green;
}

.controls {
  position: fixed;
  bottom: 10px;
  width: 100%;
  display: flex;
  justify-content: space-around;
}

button {
  width: 70px;
  height: 70px;
}
</style>
</head>

<body>

<div id="mario"></div>
<div class="ground"></div>

<div class="controls">
  <button onclick="move(-20)">⬅️</button>
  <button onclick="jump()">⬆️</button>
  <button onclick="move(20)">➡️</button>
</div>

<script>
let mario = document.getElementById("mario");

let x = 50;
let y = 60;
let v = 0;
let g = 0.6;
let jumping = false;

function move(d) {
  x += d;
}

function jump() {
  if (!jumping) {
    v = 12;
    jumping = true;
  }
}

function loop() {
  v -= g;
  y += v;

  if (y <= 60) {
    y = 60;
    v = 0;
    jumping = false;
  }

  mario.style.left = x + "px";
  mario.style.bottom = y + "px";

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
