<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mario Mobil - Okul Sergisi</title>
    <style>
        body { margin: 0; overflow: hidden; background: #5c94fc; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        
        /* Mobil Butonlar */
        .controls {
            position: absolute; bottom: 20px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box;
        }
        .btn-group { display: flex; gap: 15px; }
        .btn {
            width: 70px; height: 70px; background: rgba(255, 255, 255, 0.4);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 24px; color: white; user-select: none;
            border: 3px solid white;
        }
        .btn:active { background: rgba(255, 255, 255, 0.8); transform: scale(0.9); }
        #jumpBtn { background: rgba(255, 0, 0, 0.4); width: 85px; height: 85px; }
    </style>
</head>
<body>

<div style="position: absolute; top: 10px; width: 100%; text-align: center; color: white; text-shadow: 2px 2px #000;">
    <h2 style="margin:0">MARIO MOBILE</h2>
    <p style="margin:5px">Puan: <span id="score">0</span></p>
</div>

<canvas id="gameCanvas"></canvas>

<!-- Dokunmatik Kontroller -->
<div class="controls">
    <div class="btn-group">
        <div class="btn" id="leftBtn">←</div>
        <div class="btn" id="rightBtn">→</div>
    </div>
    <div class="btn" id="jumpBtn">Zıpla</div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;
const gravity = 0.6;
let moveLeft = false;
let moveRight = false;

const player = {
    x: 50, y: 100, w: 35, h: 50,
    dy: 0, speed: 4, jumpForce: 12, grounded: false
};

const platforms = [
    {x: 0, y: canvas.height - 120, w: 2000, h: 120, color: "#74bf2e"}, // Yer
    {x: 100, y: canvas.height - 220, w: 100, h: 30, color: "#ab5233"},
    {x: 250, y: canvas.height - 320, w: 100, h: 30, color: "#ab5233"},
    {x: 400, y: canvas.height - 250, w: 120, h: 30, color: "#f7d519"}
];

// Dokunmatik Eventler
const setupBtn = (id, startFn, endFn) => {
    const btn = document.getElementById(id);
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); startFn(); });
    btn.addEventListener('touchend', (e) => { e.preventDefault(); endFn(); });
};

setupBtn('leftBtn', () => moveLeft = true, () => moveLeft = false);
setupBtn('rightBtn', () => moveRight = true, () => moveRight = false);
setupBtn('jumpBtn', () => { if(player.grounded) player.dy = -player.jumpForce; }, () => {});

function update() {
    if (moveLeft) player.x -= player.speed;
    if (moveRight) player.x += player.speed;

    player.dy += gravity;
    player.y += player.dy;

    player.grounded = false;
    platforms.forEach(p => {
        if (player.x < p.x + p.w && player.x + player.w > p.x &&
            player.y < p.y + p.h && player.y + player.h > p.y) {
            if (player.dy > 0) {
                player.dy = 0;
                player.y = p.y - player.h;
                player.grounded = true;
            }
        }
    });

    if (player.x < 0) player.x = 0;
    if (player.x > canvas.width - player.w) player.x = canvas.width - player.w;

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Arka plan bulut
    ctx.fillStyle = "white";
    ctx.beginPath(); ctx.arc(80, 80, 20, 0, Math.PI*2); ctx.arc(110, 80, 25, 0, Math.PI*2); ctx.fill();

    // Platformlar
    platforms.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.strokeStyle = "#4a2512";
        ctx.strokeRect(p.x, p.y, p.w, p.h);
    });

    // Basit Mario Karakteri
    ctx.fillStyle = "red"; // Şapka/Gövde
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.fillStyle = "blue"; // Pantolon
    ctx.fillRect(player.x, player.y + 30, player.w, 20);
    ctx.fillStyle = "#ffdbac"; // Yüz
    ctx.fillRect(player.x + 10, player.y + 5, 20, 15);
}

update();
</script>
</body>
</html>
